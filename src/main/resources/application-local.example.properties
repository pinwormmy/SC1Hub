# Copy this file to application-local.properties and edit values for your machine.
# application-local.properties is git-ignored.

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/sc1hub_local?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=sc1hub_local
spring.datasource.password=change-me

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=
spring.mail.password=

# run-local.sh appends stricter safety overrides after this file.
sc1hub.gemini.apiKey=
sc1hub.gemini.allowLiveCalls=false
sc1hub.assistant.bot.enabled=false
sc1hub.assistant.bot.autoPublishEnabled=false
sc1hub.assistant.bot.autoPublishCatchUpEnabled=false
sc1hub.assistant.rag.enabled=false
sc1hub.assistant.rag.autoUpdate.enabled=false
